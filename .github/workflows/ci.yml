name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:lib # build first so the `ng-blatui` path (dist/) resolves for lint/types
      - run: npm run check:api-docs # extract API from the typed source + fail on any undocumented member
      - name: API docs are regenerated & committed
        run: |
          git diff --quiet -- projects/demo/src/app/generated/api.ts projects/demo/public/api.json \
            || { echo "::error::Component API is out of date — run \`npm run extract:api\` (and \`npm run build:registry\`) and commit."; exit 1; }
      - run: npm run lint
      - run: npm run test:ci
