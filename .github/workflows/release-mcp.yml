name: Release MCP

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-mcp
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish ng-blatui-mcp
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish --access public --provenance
      - name: Skip publish (no NPM_TOKEN secret)
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "::warning::NPM_TOKEN secret is not set — ng-blatui-mcp publish skipped."
