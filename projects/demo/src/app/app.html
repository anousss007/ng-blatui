<div class="min-h-screen bg-background text-foreground">
  <header
    class="sticky top-0 z-40 border-b bg-background/80 backdrop-blur-xl supports-[backdrop-filter]:bg-background/65"
  >
    <div class="mx-auto flex h-14 max-w-screen-2xl items-center gap-3 px-4 lg:px-6">
      <a routerLink="/" class="flex shrink-0 items-center gap-2.5 font-semibold tracking-tight">
        <span
          class="grid size-7 place-items-center rounded-md bg-primary text-primary-foreground shadow-sm"
        >
          <svg
            class="size-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="m4 17 6-6-6-6M12 19h8" />
          </svg>
        </span>
        <span class="font-mono text-[15px]">ng-blatui</span>
      </a>
      <nav class="ml-3 hidden items-center gap-0.5 text-sm lg:flex">
        <a
          class="rounded-md px-3 py-1.5 font-medium transition-colors"
          routerLink="/components"
          routerLinkActive="bg-accent text-accent-foreground"
          >Components</a
        >
        <a
          class="rounded-md px-3 py-1.5 font-medium transition-colors"
          routerLink="/blocks"
          routerLinkActive="bg-accent text-accent-foreground"
          >Blocks</a
        >
        <a
          class="rounded-md px-3 py-1.5 font-medium transition-colors"
          routerLink="/templates"
          routerLinkActive="bg-accent text-accent-foreground"
          >Templates</a
        >
        <a
          class="rounded-md px-3 py-1.5 font-medium transition-colors"
          routerLink="/docs/installation"
          routerLinkActive="bg-accent text-accent-foreground"
          >Docs</a
        >
      </nav>
      <div class="ml-auto flex items-center gap-1.5">
        <a
          buiButton
          variant="outline"
          size="sm"
          href="https://github.com/anousss007/ng-blatui"
          rel="noreferrer"
          >GitHub</a
        >
        <a buiButton size="sm" href="https://www.npmjs.com/package/ng-blatui" rel="noreferrer"
          >npm</a
        >
      </div>
    </div>
  </header>

  @if (isHome()) {
    <main class="min-w-0">
      <router-outlet />
    </main>
  } @else {
    <div class="mx-auto flex max-w-screen-2xl gap-8 px-4 py-8 lg:px-6">
      <aside
        class="sticky top-20 hidden h-[calc(100vh-6rem)] w-52 shrink-0 overflow-y-auto md:block"
      >
        @for (group of nav; track group.title) {
          <div class="mb-6">
            <p class="mb-2 text-xs font-semibold tracking-wide text-muted-foreground uppercase">
              {{ group.title }}
            </p>
            <ul class="space-y-0.5">
              @for (link of group.links; track link.label) {
                <li>
                  <a
                    class="block rounded-md px-2 py-1 text-sm text-muted-foreground hover:bg-accent hover:text-foreground"
                    [routerLink]="link.path"
                    routerLinkActive="text-foreground font-medium"
                    [routerLinkActiveOptions]="{ exact: true }"
                    >{{ link.label }}</a
                  >
                </li>
              }
            </ul>
          </div>
        }
      </aside>

      <main class="min-w-0 flex-1 pb-16">
        <router-outlet />
      </main>
    </div>
  }

  <footer class="border-t">
    <div
      class="mx-auto flex max-w-screen-2xl flex-col items-center justify-between gap-3 px-4 py-8 text-sm text-muted-foreground sm:flex-row lg:px-6"
    >
      <p>ng-blatui — BlatUI, ported to Angular. MIT.</p>
      <div class="flex items-center gap-4">
        <a
          class="hover:text-foreground"
          href="https://github.com/anousss007/ng-blatui"
          rel="noreferrer"
          >GitHub</a
        >
        <a
          class="hover:text-foreground"
          href="https://www.npmjs.com/package/ng-blatui"
          rel="noreferrer"
          >npm</a
        >
        <a class="hover:text-foreground" routerLink="/docs/installation">Docs</a>
      </div>
    </div>
  </footer>

  <bui-theme-customizer />
</div>
