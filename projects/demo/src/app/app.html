<div class="min-h-screen bg-background text-foreground">
  <header class="sticky top-0 z-40 border-b bg-background/80 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3">
      <a routerLink="/" class="text-lg font-bold tracking-tight">ng-blatui</a>
      <nav class="flex items-center gap-1">
        <a buiButton variant="ghost" size="sm" routerLink="/docs/installation">Docs</a>
        <a buiButton variant="ghost" size="sm" routerLink="/components">Components</a>
        <a
          buiButton
          variant="ghost"
          size="sm"
          href="https://github.com/anousss007/ng-blatui"
          rel="noreferrer"
        >
          GitHub
        </a>
        <a
          buiButton
          variant="ghost"
          size="sm"
          href="https://www.npmjs.com/package/ng-blatui"
          rel="noreferrer"
        >
          npm
        </a>
      </nav>
    </div>
  </header>

  <div class="mx-auto flex max-w-6xl gap-8 px-4 py-8">
    <aside class="sticky top-20 hidden h-[calc(100vh-6rem)] w-52 shrink-0 overflow-y-auto md:block">
      @for (group of nav; track group.title) {
        <div class="mb-6">
          <p class="mb-2 text-xs font-semibold tracking-wide text-muted-foreground uppercase">
            {{ group.title }}
          </p>
          <ul class="space-y-0.5">
            @for (link of group.links; track link.label) {
              <li>
                <a
                  class="block rounded-md px-2 py-1 text-sm text-muted-foreground hover:bg-accent hover:text-foreground"
                  [routerLink]="link.path"
                  routerLinkActive="text-foreground font-medium"
                  [routerLinkActiveOptions]="{ exact: true }"
                  >{{ link.label }}</a
                >
              </li>
            }
          </ul>
        </div>
      }
    </aside>

    <main class="min-w-0 flex-1 pb-16">
      <router-outlet />
    </main>
  </div>

  <bui-theme-customizer />
</div>
